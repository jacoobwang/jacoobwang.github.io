{{- /* Head custom content area start */ -}}
<style>
/* 粒子动画背景 */
#particles-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
}

/* 首页特殊样式 */
.home-page #particles-canvas {
    z-index: 0;
}

/* 确保内容在粒子之上 */
.main {
    position: relative;
    z-index: 1;
}

/* 烟花效果 */
.firework {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    pointer-events: none;
}

@keyframes explode {
    0% {
        transform: translate(0, 0);
        opacity: 1;
    }
    100% {
        opacity: 0;
    }
}

/* 鼠标跟随粒子 */
.cursor-particle {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    animation: fadeOut 1s ease-out forwards;
}

@keyframes fadeOut {
    0% {
        transform: scale(1);
        opacity: 1;
    }
    100% {
        transform: scale(0);
        opacity: 0;
    }
}

/* 霓虹发光效果 */
.glow-text {
    text-shadow: 
        0 0 5px #fff,
        0 0 10px #fff,
        0 0 20px #ff00de,
        0 0 30px #ff00de,
        0 0 40px #ff00de;
    animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% {
        opacity: 1;
    }
    50% {
        opacity: 0.8;
    }
}

/* 浮动动画 */
.float-animation {
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0%, 100% {
        transform: translateY(0);
    }
    50% {
        transform: translateY(-10px);
    }
}

.github-contributions-card {
    width: min(100%, 920px);
    margin-top: 2rem;
    padding: 1.25rem;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.82);
    border: 1px solid rgba(15, 23, 42, 0.08);
    box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
    backdrop-filter: blur(14px);
}

.dark .github-contributions-card {
    background: rgba(17, 25, 40, 0.78);
    border-color: rgba(148, 163, 184, 0.18);
    box-shadow: 0 20px 60px rgba(2, 6, 23, 0.32);
}

.github-contributions-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
}

.github-contributions-header h2 {
    margin: 0;
    font-size: 1rem;
}

.github-contributions-header a {
    font-size: 0.95rem;
    opacity: 0.85;
}

.github-contributions-card img {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 12px;
    background: #fff;
}

.dark .github-contributions-card img {
    background: #0b1220;
}

@media (max-width: 768px) {
    .github-contributions-card {
        padding: 1rem;
    }
}
</style>
{{- /* Head custom content area end */ -}}
